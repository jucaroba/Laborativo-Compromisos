<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compromisos de Equipo — Laborativo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root{--c:#6204BF;--cd:#5203A3;--c-rgb:98,4,191}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:#F4F4F5;color:#18181B}

    /* ── FORM ──────────────────────────────────────────────── */
    #fv{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:#F4F4F5;overflow-y:auto}
    #fc{width:100%;max-width:460px;background:#fff;border:1px solid #E4E4E7;border-radius:16px;padding:2rem;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    #ffoot{font-size:.72rem;color:#A1A1AA;text-align:center;margin-top:1.2rem}
    #fq{font-size:1.65rem;font-weight:700;color:#fff;line-height:1.25;background:var(--c);margin:-2rem -2rem 1.75rem -2rem;padding:1.4rem 2rem;border-radius:14px 14px 0 0}
    .fg{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem}
    .fg label{font-size:.72rem;letter-spacing:.07em;text-transform:uppercase;color:#71717A;font-weight:600}
    .fg input,.fg textarea{background:#fff;border:1.5px solid #E4E4E7;border-radius:10px;padding:.75rem 1rem;color:#18181B;font-size:.95rem;font-family:inherit;resize:none;outline:none;transition:border .2s}
    .fg input:focus,.fg textarea:focus{border-color:var(--c)}
    #catsel{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}
    .catopt{border:1.5px solid #E4E4E7;border-radius:10px;padding:.75rem 1rem;cursor:pointer;transition:all .15s;font-weight:600;color:#52525B;font-size:.95rem;text-align:center;display:flex;align-items:center;justify-content:center;min-height:56px}
    .catopt:hover{border-color:var(--c);background:color-mix(in srgb,var(--c) 5%,white)}
    .catopt.sel{border-color:var(--c);background:color-mix(in srgb,var(--c) 8%,white);color:var(--c)}
    #charcnt{font-size:.68rem;color:#A1A1AA;text-align:right;margin-top:.2rem}
    #fsbtn{width:100%;padding:.9rem;background:var(--c);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.3rem}
    #fsbtn:hover{background:var(--cd)}
    #fsbtn:disabled{opacity:.5;cursor:default}
    #fsuccess{display:none;flex-direction:column;align-items:center;text-align:center;gap:.75rem;padding:1.5rem 0}
    #fsicon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--c),var(--cd));display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#fff}
    #fsuccess h3{color:#18181B;font-size:1.1rem}
    #fsuccess p{color:#71717A;font-size:.88rem}

    /* ── INTRO ─────────────────────────────────────────────── */
    #iv{min-height:100vh;display:flex;flex-direction:column;background:#1A1A1A;color:#fff}
    #iheader{display:flex;flex-direction:column;align-items:center;padding-top:3.5rem;gap:.3rem;flex-shrink:0}
    #isubtitle{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);font-weight:500}
    #ilogoimg{height:56px;object-fit:contain;filter:brightness(0) invert(1)}
    #icenter{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:2rem}
    #iq{font-size:3.75rem;font-weight:800;color:var(--c);text-align:center;line-height:1.2;max-width:860px}
    #iqrwrap{background:#fff;border-radius:24px;padding:1.25rem;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
    #iqrwrap canvas{display:block}
    #iqlabel{font-size:1.5rem;font-weight:700;color:#fff;text-align:center}
    #iparticipants{display:flex;flex-direction:column;align-items:center;gap:.75rem;margin-top:.5rem}
    #ipartcount{font-size:.875rem;color:var(--c);font-weight:500}
    #ipartchips{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;max-width:700px}
    .ichip{padding:.25rem .75rem;border-radius:9999px;font-size:.875rem;font-weight:500;color:#6B7280;background:#fff;border:1px solid #E5E7EB}
    #ienter{padding:1rem 2.8rem;background:var(--c);border:none;border-radius:12px;color:#fff;font-size:1.15rem;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;font-family:inherit;box-shadow:0 4px 16px rgba(var(--c-rgb),.35)}
    #ienter:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(var(--c-rgb),.45)}

    /* ── SCREEN ────────────────────────────────────────────── */
    #sv{height:100vh;display:flex;flex-direction:column;overflow:hidden}
    #sh{display:flex;align-items:center;gap:1rem;padding:.75rem 10rem;background:var(--c);flex-shrink:0}
    #sleft{display:flex;flex-direction:column;gap:.3rem;min-width:130px}
    #slogo2{font-size:1rem;color:#fff;font-weight:500}
    #spc{display:flex;flex-direction:column;align-items:flex-start;gap:0}
    #spn{font-size:4.5rem;font-weight:800;color:#fff;line-height:1}
    #spl{font-size:1rem;color:#fff;margin-top:.1rem}
    #sq{flex:1;font-size:2.6rem;font-weight:700;color:#fff;text-align:center;line-height:1.4;padding:0 1rem}
    #sqrbox{display:flex;flex-direction:column;align-items:center;gap:.3rem;min-width:100px}
    #qrwrap{border-radius:6px;overflow:hidden}
    #qrwrap canvas{display:block;border-radius:3px}
    #qrlabel{font-size:1rem;color:#fff;text-align:center}
    #sgrid{flex:1;display:grid;grid-template-columns:repeat(2,1fr);align-items:start;gap:0;padding:.75rem 0;overflow-y:auto;background:#F4F4F5;position:relative}
    #sgrid::before{content:'';position:absolute;left:50%;top:.75rem;bottom:.75rem;border-left:2px dashed #B0BEC5;pointer-events:none}
    .cs{background:transparent;border:none;display:flex;flex-direction:column;padding:0 1rem}
    .ch{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.3rem .1rem .5rem;margin-bottom:.3rem}
    .cn{font-size:1.64rem;font-weight:600;color:var(--c);text-align:center}
    .ch-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
    .ck{font-size:1.3rem;font-weight:700;color:var(--c);background:color-mix(in srgb,var(--c) 10%,white);border-radius:20px;padding:.15rem .55rem;flex-shrink:0}
    .cklabel{font-size:1rem;color:var(--c);flex-shrink:0}
    .cl{padding:0;columns:3;column-gap:.5rem}
    .card{break-inside:avoid;margin-bottom:.5rem;background:#fff;border:1.5px solid var(--c);border-top:3px solid var(--c);border-radius:0 !important;padding:.5rem .7rem;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:transform .4s ease,opacity .4s ease;display:block;overflow:hidden}
    .card.enter{transform:translateY(-8px);opacity:0}
    .cr{font-size:1rem;color:#1C1C1E;line-height:1.45}
    .cname{font-size:.88rem;color:var(--cd);margin-top:.25rem;font-weight:600}
    .empty{font-size:.78rem;color:#D4D4D8;text-align:center;padding:.5rem}
    #rbar{padding:.35rem .9rem;display:flex;justify-content:space-between;align-items:center;gap:.5rem;background:#fff;border-top:1px solid #E4E4E7;flex-shrink:0}
    #rbtn,#pbtn{border-radius:6px;padding:.2rem .65rem;font-size:.72rem;cursor:pointer;background:var(--c);border:none;color:#fff;transition:background .2s}
    #rbtn:hover,#pbtn:hover{background:var(--cd)}
    #bbtn{border-radius:6px;padding:.2rem .65rem;font-size:.72rem;cursor:pointer;background:transparent;border:1.5px solid #E4E4E7;color:#71717A;transition:all .2s;font-family:inherit}
    #bbtn:hover{border-color:var(--c);color:var(--c)}

    /* ── ADMIN ─────────────────────────────────────────────── */
    #av{height:100vh;display:flex;flex-direction:column;overflow:hidden}
    /* Header igual al de Preguntas */
    #ah{padding:.7rem 1.25rem;background:var(--c);display:flex;align-items:center;gap:.75rem;flex-shrink:0}
    #ahlogomark{height:28px;object-fit:contain;flex-shrink:0;filter:brightness(0) invert(1)}
    #ahlogo{font-size:.95rem;font-weight:600;color:#fff;letter-spacing:.01em}
    #abody{flex:1;display:flex;overflow:hidden}
    /* Sidebar */
    #asidebar{width:220px;background:#fff;border-right:1px solid #E4E4E7;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
    #anewsection{padding:.9rem .9rem .5rem;flex-shrink:0}
    #anewlabel{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:#A1A1AA;font-weight:600;margin-bottom:.5rem}
    #anewwrap{display:flex;gap:.4rem}
    #anewi{flex:1;border:1.5px solid #E4E4E7;border-radius:8px;padding:.45rem .65rem;font-size:.85rem;font-family:inherit;outline:none;color:#18181B;transition:border .2s;min-width:0}
    #anewi:focus{border-color:var(--c)}
    #anewb{width:32px;height:32px;background:var(--c);border:none;border-radius:8px;color:#fff;font-size:1.2rem;font-weight:400;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
    #anewb:hover{background:var(--cd)}
    #anewb:disabled{opacity:.5;cursor:default}
    #alist{flex:1;overflow-y:auto;padding:.4rem .5rem}
    .aemptylist{font-size:.8rem;color:#A1A1AA;text-align:center;padding:1.5rem .75rem;line-height:1.6}
    .asession{padding:.6rem .75rem;border-radius:8px;cursor:pointer;transition:all .15s;position:relative;display:flex;align-items:center;gap:.55rem;margin-bottom:.2rem}
    .asession:hover{background:#F4F4F5}
    .asession.active{background:var(--c)}
    .asession.active .asname{color:#fff}
    .asession.active .asmeta{color:rgba(255,255,255,.65)}
    .asession.active .asdel{color:rgba(255,255,255,.5)}
    .asession.active .asdel:hover{color:#fff;background:rgba(255,255,255,.15)}
    .ascolordot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .asinfo{display:flex;flex-direction:column;gap:.1rem;flex:1;min-width:0;padding-right:1.2rem}
    .asname{font-size:.88rem;font-weight:600;color:#18181B;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .asmeta{font-size:.72rem;color:#A1A1AA}
    .asdel{position:absolute;top:.5rem;right:.4rem;background:none;border:none;color:#D4D4D8;cursor:pointer;font-size:1rem;line-height:1;padding:.15rem .3rem;border-radius:4px;transition:all .15s;opacity:0}
    .asession:hover .asdel{opacity:1}
    .asdel:hover{color:#EF4444 !important;background:#FEF2F2 !important}
    /* Main */
    #amain{flex:1;overflow-y:auto;background:#F4F4F5;padding:1.5rem}
    #aempty{display:flex;align-items:center;justify-content:center;height:100%;font-size:.9rem;color:#A1A1AA}
    #adetail{max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:1.25rem}
    /* Cabecera del detalle — igual a Preguntas */
    #adetailhead{background:#fff;border:1px solid #E4E4E7;border-radius:12px;padding:1.1rem 1.25rem}
    #adetailhead-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.45rem}
    #atitlerow{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0}
    #atitle{font-size:1.25rem;font-weight:700;color:#18181B;line-height:1.3}
    #aeditnamebtn{background:none;border:none;cursor:pointer;color:#A1A1AA;font-size:.9rem;padding:.15rem .3rem;border-radius:4px;transition:color .15s;line-height:1;flex-shrink:0}
    #aeditnamebtn:hover{color:var(--c)}
    #asubtitle{font-size:.82rem;color:#71717A;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
    .asubdot{color:#D4D4D8}
    .acolorswatch{width:16px;height:16px;border-radius:4px;display:inline-block;border:1px solid rgba(0,0,0,.12);cursor:pointer;vertical-align:middle;flex-shrink:0}
    #acolorinput{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
    #areiniciarbtn{padding:.4rem .9rem;background:transparent;border:1.5px solid #FECACA;border-radius:7px;color:#EF4444;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;flex-shrink:0}
    #areiniciarbtn:hover{background:#FEF2F2}
    /* Botones de acción — 3 tarjetas iguales */
    #aactioncards{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}
    .acard{background:#fff;border:1px solid #E4E4E7;border-radius:12px;padding:1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;cursor:pointer;text-decoration:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
    .acard:hover{border-color:var(--c);box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .acardicon{font-size:1.1rem;color:#A1A1AA}
    .acardlabel{font-size:.88rem;font-weight:600;color:#52525B}
    /* Edición del nombre */
    .anameedit{display:flex;align-items:center;gap:.5rem;flex:1}
    .anameinput{flex:1;border:1.5px solid var(--c);border-radius:8px;padding:.35rem .65rem;font-size:1.1rem;font-weight:700;font-family:inherit;outline:none;color:#18181B;min-width:0}
    /* Pregunta */
    .asec{background:#fff;border:1px solid #E4E4E7;border-radius:12px;padding:1.1rem 1.25rem}
    .aseclabel{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:#A1A1AA;font-weight:600;margin-bottom:.55rem}
    .aval{font-size:1rem;color:#18181B;cursor:pointer;padding:.35rem .45rem;border-radius:6px;transition:background .15s;line-height:1.45}
    .aval:hover{background:#F4F4F5}
    .aquestval{font-size:1.05rem;font-weight:600}
    .aeditlabel{font-size:.7rem;color:#A1A1AA;margin-left:.35rem;font-weight:400;vertical-align:middle}
    .aeditwrap{display:flex;flex-direction:column;gap:.5rem}
    .aedrow{display:flex;gap:.5rem;margin-top:.25rem}
    .aedit{border:1.5px solid #E4E4E7;border-radius:8px;padding:.6rem .8rem;font-size:.95rem;font-family:inherit;outline:none;color:#18181B;transition:border .2s;width:100%;resize:vertical}
    .aedit:focus{border-color:var(--c)}
    .asave{padding:.4rem .9rem;background:var(--c);border:none;border-radius:6px;color:#fff;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
    .asave:hover{background:var(--cd)}
    .acancel{padding:.4rem .9rem;background:transparent;border:1.5px solid #E4E4E7;border-radius:6px;color:#71717A;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s}
    .acancel:hover{border-color:#A1A1AA}
    .asave.sm,.acancel.sm{padding:.25rem .6rem;font-size:.78rem}
    /* Categorías */
    #acatlist{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.8rem}
    .acatrow{display:flex;align-items:center;gap:.5rem;padding:.3rem .2rem;border-radius:6px}
    .acatname{flex:1;font-size:.95rem;color:#18181B;font-weight:500}
    .acatbtns{display:flex;gap:.3rem;flex-shrink:0}
    .acatbtn{padding:.25rem .6rem;border-radius:5px;font-size:.75rem;cursor:pointer;background:transparent;border:1.5px solid #E4E4E7;color:#71717A;font-family:inherit;transition:all .15s}
    .acatbtn:hover{border-color:var(--c);color:var(--c)}
    .acatbtn.del:hover{border-color:#EF4444;color:#EF4444}
    .acatedit{flex:1;border:1.5px solid var(--c);border-radius:6px;padding:.35rem .65rem;font-size:.9rem;font-family:inherit;outline:none;color:#18181B}
    .aaddcat{padding:.45rem 1rem;background:transparent;border:1.5px dashed #D4D4D8;border-radius:8px;color:#71717A;font-size:.85rem;cursor:pointer;font-family:inherit;transition:all .15s;width:100%}
    .aaddcat:hover{border-color:var(--c);color:var(--c)}

    /* ── PRINT ─────────────────────────────────────────────── */
    #print-view{display:none}
    @media print{
      #root{display:none}
      #print-view{display:block;font-family:'DM Sans',sans-serif;color:#1C1C1E;padding:2.5rem}
      .ph{background:var(--c) !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;margin-bottom:2rem;padding:1.2rem 1.5rem;border-radius:4px}
      .ph h1{font-size:1.6rem;font-weight:800;color:#fff !important;margin-bottom:.3rem}
      .ph p{font-size:.85rem;color:rgba(255,255,255,.85) !important}
      .pcat{margin-top:2rem;margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:2px solid var(--c);display:flex;align-items:baseline;gap:.75rem}
      .pcat h2{font-size:1.15rem;font-weight:700;color:var(--c)}
      .pcat span{font-size:.78rem;color:#A1A1AA}
      .pcard{padding:.5rem 0;border-bottom:1px solid #F0F0F0}
      .pcr{font-size:.9rem;line-height:1.45;margin-bottom:.1rem}
      .pcname{font-size:.78rem;color:var(--cd);font-weight:600;margin-top:0}
    }
  </style>
</head>
<body>
<div id="root"></div>
<div id="print-view"></div>
<script>
// ─────────────────────────────────────────
// CONFIGURACIÓN
// ─────────────────────────────────────────
const SUPABASE_URL  = 'https://vnyzgbzqwqorimssuxza.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZueXpnYnpxd3Fvcmltc3N1eHphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTY2MTgsImV4cCI6MjA4ODkzMjYxOH0.sjRR89kZb8Dk5Dtuj4xmntlC2KX9IDzIeMwGBGvLUF8';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const params = new URLSearchParams(location.search);
const VIEW = params.get('view') || 'admin';
const SESSION_ID = params.get('session');

if      (VIEW === 'form'   && SESSION_ID) initForm();
else if (VIEW === 'screen' && SESSION_ID) initScreen();
else                                       initAdmin();

// ── COLOR ──────────────────────────────────────────────────────
function applyColor(hex) {
  if (!hex || !/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const dr = Math.max(0,Math.round(r*.88)).toString(16).padStart(2,'0');
  const dg = Math.max(0,Math.round(g*.88)).toString(16).padStart(2,'0');
  const db = Math.max(0,Math.round(b*.88)).toString(16).padStart(2,'0');
  document.documentElement.style.setProperty('--c', hex);
  document.documentElement.style.setProperty('--cd', `#${dr}${dg}${db}`);
  document.documentElement.style.setProperty('--c-rgb', `${r},${g},${b}`);
}

// ══════════════════════════════════════════════════════════════
// ADMIN
// ══════════════════════════════════════════════════════════════

let adminSessions   = [];
let adminSelected   = null;
let adminCats       = [];
let adminCounts     = {};
let adminEditField  = null;
let adminEditCatId  = null;

async function initAdmin() {
  document.getElementById('root').innerHTML = `
    <div id="av">
      <header id="ah">
        <img id="ahlogomark" src="logo.png" alt="Laborativo">
        <span id="ahlogo">Laborativo Compromisos · Admin</span>
      </header>
      <div id="abody">
        <aside id="asidebar">
          <div id="anewsection">
            <p id="anewlabel">Nueva sesión</p>
            <div id="anewwrap">
              <input id="anewi" type="text" placeholder="Nombre de la sesión" maxlength="80" autocomplete="off">
              <button id="anewb" onclick="createSession()" title="Crear sesión">+</button>
            </div>
          </div>
          <div id="alist"></div>
        </aside>
        <main id="amain">
          <div id="aempty">Selecciona una sesión para editarla</div>
        </main>
      </div>
    </div>`;

  document.getElementById('anewi').addEventListener('keydown', e => {
    if (e.key === 'Enter') createSession();
  });

  await loadAdminSessions();
}

async function loadAdminSessions() {
  const { data: sessions } = await sb.from('sessions').select('*').order('created_at', { ascending: false });
  adminSessions = sessions || [];

  if (adminSessions.length) {
    const ids = adminSessions.map(s => s.id);
    const { data: rows } = await sb.from('commitments').select('session_id').in('session_id', ids);
    adminCounts = {};
    (rows || []).forEach(r => {
      adminCounts[r.session_id] = (adminCounts[r.session_id] || 0) + 1;
    });
  }

  renderAdminSidebar();
}

function renderAdminSidebar() {
  const list = document.getElementById('alist');
  if (!list) return;

  if (!adminSessions.length) {
    list.innerHTML = '<p class="aemptylist">No hay sesiones.<br>Crea una arriba.</p>';
    return;
  }

  list.innerHTML = adminSessions.map(s => `
    <div class="asession${adminSelected?.id === s.id ? ' active' : ''}" onclick="selectSession('${s.id}')">
      <span class="ascolordot" style="background:${s.color||'#4CAF50'}"></span>
      <div class="asinfo">
        <span class="asname">${esc(s.name)}</span>
      </div>
      <button class="asdel" onclick="deleteSession(event,'${s.id}')" title="Eliminar sesión">×</button>
    </div>`).join('');
}

async function selectSession(id) {
  adminSelected  = adminSessions.find(s => s.id === id) || null;
  adminEditField = null;
  adminEditCatId = null;
  renderAdminSidebar();
  if (!adminSelected) return;

  const { data } = await sb.from('session_categories')
    .select('*').eq('session_id', id).order('order_index');
  adminCats = data || [];
  renderAdminMain();
}

function renderAdminMain() {
  const main = document.getElementById('amain');
  if (!main) return;

  if (!adminSelected) {
    main.innerHTML = '<div id="aempty">Selecciona una sesión para editarla</div>';
    return;
  }

  const s         = adminSelected;
  const count     = adminCounts[s.id] || 0;
  const color     = s.color || '#4CAF50';
  const formUrl   = `${location.origin}${location.pathname}?view=form&session=${s.id}`;
  const screenUrl = `${location.origin}${location.pathname}?view=screen&session=${s.id}`;

  main.innerHTML = `
    <div id="adetail">

      <!-- Cabecera: título + subtítulo + reiniciar -->
      <div id="adetailhead">
        <div id="adetailhead-top">
          <div id="atitlerow">
            ${adminEditField === 'name' ? `
              <div class="anameedit">
                <input id="anamei" type="text" value="${esc(s.name)}" maxlength="80" class="anameinput"
                  onkeydown="if(event.key==='Enter')saveSessionName();if(event.key==='Escape')cancelAdminEdit()">
                <button class="asave sm" onclick="saveSessionName()">✓</button>
                <button class="acancel sm" onclick="cancelAdminEdit()">✕</button>
              </div>
            ` : `
              <span id="atitle">${esc(s.name)}</span>
              <button id="aeditnamebtn" onclick="startAdminEdit('name')" title="Editar nombre">✏</button>
            `}
          </div>
          <button id="areiniciarbtn" onclick="resetSessionCommitments('${s.id}')">Limpiar compromisos</button>
        </div>
        <div id="asubtitle">
          <span>${count} compromiso${count !== 1 ? 's' : ''}</span>
          <span class="asubdot">·</span>
          <span>${adminCats.length} categoría${adminCats.length !== 1 ? 's' : ''}</span>
          <span class="asubdot">·</span>
          <span>Color:</span>
          <span class="acolorswatch" id="acolorswatch" style="background:${color}" title="Cambiar color"
            onclick="document.getElementById('acolorinput').click()"></span>
          <input type="color" id="acolorinput" value="${color}"
            oninput="document.getElementById('acolorswatch').style.background=this.value"
            onchange="saveSessionColor(this.value)">
        </div>
      </div>

      <!-- Tarjetas de acceso rápido -->
      <div id="aactioncards">
        <a href="${screenUrl}" target="_blank" class="acard">
          <span class="acardicon">↗</span>
          <span class="acardlabel">QR / Pantalla</span>
        </a>
        <button class="acard" onclick="copyFormLink('${formUrl}', this)">
          <span class="acardicon">🔗</span>
          <span class="acardlabel">Copiar link formulario</span>
        </button>
      </div>

      <!-- Pregunta -->
      <div class="asec">
        <div class="aseclabel">Pregunta</div>
        ${adminEditField === 'question' ? `
          <div class="aeditwrap">
            <textarea id="aquesti" class="aedit" rows="3" maxlength="200">${esc(s.question)}</textarea>
            <div class="aedrow">
              <button class="asave" onclick="saveSessionQuestion()">Guardar</button>
              <button class="acancel" onclick="cancelAdminEdit()">Cancelar</button>
            </div>
          </div>
        ` : `
          <div class="aval aquestval" onclick="startAdminEdit('question')">${esc(s.question)}<span class="aeditlabel">editar</span></div>
        `}
      </div>

      <!-- Categorías -->
      <div class="asec">
        <div class="aseclabel">Categorías</div>
        <div id="acatlist">
          ${adminCats.map(c => `
            <div class="acatrow">
              ${adminEditCatId === c.id ? `
                <input id="acati_${c.id}" class="acatedit" type="text" value="${esc(c.name)}" maxlength="60"
                  onkeydown="if(event.key==='Enter')saveCat('${c.id}');if(event.key==='Escape')cancelAdminEdit()">
                <button class="asave sm" onclick="saveCat('${c.id}')">✓</button>
                <button class="acancel sm" onclick="cancelAdminEdit()">✕</button>
              ` : `
                <span class="acatname">${esc(c.name)}</span>
                <div class="acatbtns">
                  <button class="acatbtn" onclick="startEditCat('${c.id}')">editar</button>
                  ${adminCats.length > 2 ? `<button class="acatbtn del" onclick="deleteCat('${c.id}')">eliminar</button>` : ''}
                </div>
              `}
            </div>`).join('')}
        </div>
        <button class="aaddcat" onclick="addCat()">+ Agregar categoría</button>
      </div>

    </div>`;

  if (adminEditField === 'name')     setTimeout(() => { const i = document.getElementById('anamei');  i?.focus(); i?.select(); }, 30);
  if (adminEditField === 'question') setTimeout(() => document.getElementById('aquesti')?.focus(), 30);
  if (adminEditCatId)                setTimeout(() => { const i = document.getElementById(`acati_${adminEditCatId}`); i?.focus(); i?.select(); }, 30);
}


async function saveSessionColor(hex) {
  if (!adminSelected || !/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  const { data } = await sb.from('sessions').update({ color: hex }).eq('id', adminSelected.id).select().single();
  if (data) {
    adminSelected = data;
    adminSessions = adminSessions.map(s => s.id === data.id ? data : s);
    renderAdminSidebar();
  }
}

function startAdminEdit(field) {
  adminEditField = field;
  adminEditCatId = null;
  renderAdminMain();
}

function cancelAdminEdit() {
  adminEditField = null;
  adminEditCatId = null;
  renderAdminMain();
}

async function createSession() {
  const input = document.getElementById('anewi');
  const name  = input?.value.trim();
  if (!name) { input?.focus(); return; }

  const btn = document.getElementById('anewb');
  btn.disabled = true;

  const { data: session } = await sb.from('sessions').insert({
    name,
    question: '¿A qué te comprometes para ganar como equipo?',
    color: '#4CAF50'
  }).select().single();

  if (session) {
    await sb.from('session_categories').insert([
      { session_id: session.id, name: 'Categoría 1', order_index: 0 },
      { session_id: session.id, name: 'Categoría 2', order_index: 1 },
    ]);
    input.value = '';
    adminSessions.unshift(session);
    adminCounts[session.id] = 0;
    renderAdminSidebar();
    await selectSession(session.id);
  }

  btn.disabled = false;
}

async function saveSessionName() {
  const name = document.getElementById('anamei')?.value.trim();
  if (!name || !adminSelected) return;

  const { data } = await sb.from('sessions').update({ name }).eq('id', adminSelected.id).select().single();
  if (data) {
    adminSelected = data;
    adminSessions = adminSessions.map(s => s.id === data.id ? data : s);
    adminEditField = null;
    renderAdminSidebar();
    renderAdminMain();
  }
}

async function saveSessionQuestion() {
  const question = document.getElementById('aquesti')?.value.trim();
  if (!question || !adminSelected) return;

  const { data } = await sb.from('sessions').update({ question }).eq('id', adminSelected.id).select().single();
  if (data) {
    adminSelected = data;
    adminSessions = adminSessions.map(s => s.id === data.id ? data : s);
    adminEditField = null;
    renderAdminMain();
  }
}

function startEditCat(id) {
  adminEditCatId = id;
  adminEditField = null;
  renderAdminMain();
}

async function saveCat(id) {
  const name = document.getElementById(`acati_${id}`)?.value.trim();
  if (!name) return;

  const { data } = await sb.from('session_categories').update({ name }).eq('id', id).select().single();
  if (data) {
    adminCats      = adminCats.map(c => c.id === id ? data : c);
    adminEditCatId = null;
    renderAdminMain();
  }
}

async function addCat() {
  if (!adminSelected) return;
  const maxOrder = adminCats.reduce((m, c) => Math.max(m, c.order_index), -1);

  const { data } = await sb.from('session_categories').insert({
    session_id:  adminSelected.id,
    name:        `Categoría ${adminCats.length + 1}`,
    order_index: maxOrder + 1
  }).select().single();

  if (data) {
    adminCats.push(data);
    adminEditCatId = data.id;
    renderAdminMain();
  }
}

async function deleteCat(id) {
  if (adminCats.length <= 2) return;
  await sb.from('session_categories').delete().eq('id', id);
  adminCats = adminCats.filter(c => c.id !== id);
  renderAdminMain();
}

async function resetSessionCommitments(id) {
  if (!confirm('¿Limpiar todos los compromisos de esta sesión? Esta acción no se puede deshacer.')) return;
  await sb.from('commitments').delete().eq('session_id', id);
  adminCounts[id] = 0;
  renderAdminSidebar();
  renderAdminMain();
}

async function deleteSession(event, id) {
  event.stopPropagation();
  const s = adminSessions.find(s => s.id === id);
  if (!confirm(`¿Eliminar la sesión "${s?.name || ''}" y todos sus compromisos?`)) return;

  await sb.from('sessions').delete().eq('id', id);
  adminSessions = adminSessions.filter(s => s.id !== id);
  delete adminCounts[id];

  if (adminSelected?.id === id) {
    adminSelected = null;
    adminCats     = [];
    const main = document.getElementById('amain');
    if (main) main.innerHTML = '<div id="aempty">Selecciona una sesión para editarla</div>';
  }

  renderAdminSidebar();
}

function copyFormLink(url, btn) {
  navigator.clipboard?.writeText(url).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  }).catch(() => prompt('Copia este link:', url));
}

// ══════════════════════════════════════════════════════════════
// FORMULARIO
// ══════════════════════════════════════════════════════════════

let formSelectedCatId = null;

async function initForm() {
  const { data: session } = await sb.from('sessions').select('*').eq('id', SESSION_ID).single();

  if (!session) {
    document.getElementById('root').innerHTML = `
      <div id="fv"><div id="fc" style="text-align:center;padding:2rem">
        <p style="color:#71717A">Sesión no encontrada.</p>
      </div></div>`;
    return;
  }

  applyColor(session.color || '#4CAF50');

  const { data: cats } = await sb.from('session_categories')
    .select('*').eq('session_id', SESSION_ID).order('order_index');
  const categories = cats || [];

  document.getElementById('root').innerHTML = `
    <div id="fv"><div id="fc">
      <h2 id="fq">${esc(session.question)}</h2>
      <div id="fff">
        <div class="fg">
          <label>Tu nombre</label>
          <input id="ni" type="text" placeholder="Ej: Camilo Restrepo" maxlength="60" autocomplete="off">
        </div>
        <div class="fg">
          <label>Categoría</label>
          <div id="catsel">
            ${categories.map(c => `<div class="catopt" data-id="${c.id}" onclick="formSelectCat(this,'${c.id}')">${esc(c.name)}</div>`).join('')}
          </div>
        </div>
        <div class="fg">
          <label>Tu compromiso</label>
          <textarea id="ri" rows="4" maxlength="150" placeholder="Escribe tu compromiso con el equipo..."></textarea>
          <span id="charcnt">0 / 150</span>
        </div>
        <button id="fsbtn" onclick="handleSubmit()">Enviar compromiso →</button>
        <p id="ffoot">una experiencia laborativo.</p>
      </div>
      <div id="fsuccess">
        <div id="fsicon">✓</div>
        <h3>¡Compromiso registrado!</h3>
        <p>Tu respuesta ya aparece en la pantalla del salón</p>
      </div>
    </div></div>`;

  document.getElementById('ri').oninput = function() {
    document.getElementById('charcnt').textContent = `${this.value.length} / 150`;
  };
}

function formSelectCat(el, id) {
  formSelectedCatId = id;
  document.querySelectorAll('.catopt').forEach(e => e.classList.toggle('sel', e === el));
}

async function handleSubmit() {
  const name = document.getElementById('ni')?.value.trim();
  const resp = document.getElementById('ri')?.value.trim();
  if (!name)             { alert('Por favor escribe tu nombre'); return; }
  if (!formSelectedCatId){ alert('Por favor selecciona una categoría'); return; }
  if (!resp)             { alert('Por favor escribe tu compromiso'); return; }

  const btn = document.getElementById('fsbtn');
  btn.textContent = '⏳ Enviando...'; btn.disabled = true;

  await sb.from('commitments').insert({
    name,
    response:    resp,
    category_id: formSelectedCatId,
    session_id:  SESSION_ID
  });

  document.getElementById('fff').style.display   = 'none';
  document.getElementById('fsuccess').style.display = 'flex';
}

// ══════════════════════════════════════════════════════════════
// PANTALLA / INTRO
// ══════════════════════════════════════════════════════════════

const screenSeen = new Set();
let screenSession = null;
let screenCats    = [];

async function initScreen() {
  const { data: session } = await sb.from('sessions').select('*').eq('id', SESSION_ID).single();

  if (!session) {
    document.getElementById('root').innerHTML = `
      <div id="iv">
        <div id="icenter"><h1 id="iq" style="font-size:1.5rem">Sesión no encontrada.</h1></div>
      </div>`;
    return;
  }

  screenSession = session;
  applyColor(session.color || '#4CAF50');

  const { data: cats } = await sb.from('session_categories')
    .select('*').eq('session_id', SESSION_ID).order('order_index');
  screenCats = cats || [];

  showIntroView();
}

async function showIntroView() {
  const formUrl = `${location.origin}${location.pathname}?view=form&session=${SESSION_ID}`;
  const c = getComputedStyle(document.documentElement).getPropertyValue('--c').trim();

  document.getElementById('root').innerHTML = `
    <div id="iv">
      <div id="iheader">
        <span id="isubtitle">una experiencia</span>
        <img id="ilogoimg" src="logo.png" alt="Laborativo">
      </div>
      <div id="icenter">
        <h1 id="iq">${esc(screenSession.question)}</h1>
        <div id="iqrwrap"></div>
        <p id="iqlabel">Escanea para participar</p>
        <div id="iparticipants">
          <p id="ipartcount">0 compromisos registrados</p>
          <div id="ipartchips"></div>
        </div>
        <button id="ienter" onclick="showCommitmentsView()">Ver compromisos →</button>
      </div>
    </div>`;

  new QRCode(document.getElementById('iqrwrap'), {
    text: formUrl, width: 312, height: 312,
    colorDark: '#000000', colorLight: '#ffffff'
  });

  const { data } = await sb.from('commitments')
    .select('id, name').eq('session_id', SESSION_ID).order('created_at', { ascending: true });
  const existing = data || [];
  existing.forEach(r => introAddChip(r));
  updateIntroCount(existing.length);

  sb.channel(`intro_${SESSION_ID}`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'commitments',
      filter: `session_id=eq.${SESSION_ID}`
    }, p => {
      introAddChip(p.new);
      updateIntroCount(document.querySelectorAll('.ichip').length);
    })
    .subscribe();
}

function introAddChip(r) {
  const chips = document.getElementById('ipartchips');
  if (!chips) return;
  const el = document.createElement('span');
  el.className = 'ichip';
  el.textContent = r.name;
  chips.appendChild(el);
}

function updateIntroCount(n) {
  const el = document.getElementById('ipartcount');
  if (el) el.textContent = `${n} compromiso${n !== 1 ? 's' : ''} registrado${n !== 1 ? 's' : ''}`;
}

async function showCommitmentsView() {
  const formUrl = `${location.origin}${location.pathname}?view=form&session=${SESSION_ID}`;
  const c = getComputedStyle(document.documentElement).getPropertyValue('--c').trim();

  document.getElementById('root').innerHTML = `
    <div id="sv">
      <header id="sh">
        <div id="sleft">
          <span id="slogo2">una experiencia laborativo.</span>
          <div id="spc"><span id="spn">0</span><span id="spl">participantes</span></div>
        </div>
        <h1 id="sq">${esc(screenSession.question)}</h1>
        <div id="sqrbox">
          <div id="qrwrap"></div>
          <p id="qrlabel">Escanea para participar</p>
        </div>
      </header>
      <div id="sgrid">
        ${screenCats.map(cat => `
          <div class="cs">
            <div class="ch">
              <span class="cn" id="cn${cat.id}">${esc(cat.name)}</span>
              <div class="ch-right">
                <span class="ck" id="ck${cat.id}">0</span>
                <span class="cklabel">compromisos</span>
              </div>
            </div>
            <div class="cl" id="cl${cat.id}"><p class="empty">—</p></div>
          </div>`).join('')}
      </div>
      <div id="rbar">
        <button id="bbtn" onclick="showIntroView()">← Volver al código QR</button>
        <div style="display:flex;gap:.5rem">
          <button id="pbtn" onclick="exportPDF()">Exportar PDF</button>
          <button id="rbtn" onclick="resetAllCommitments()">Limpiar respuestas</button>
        </div>
      </div>
    </div>`;

  new QRCode(document.getElementById('qrwrap'), {
    text: formUrl, width: 90, height: 90,
    colorDark: '#fff', colorLight: c
  });

  const { data } = await sb.from('commitments')
    .select('*').eq('session_id', SESSION_ID).order('created_at', { ascending: true });
  (data || []).forEach(r => addCard(r));
  updateCount(data?.length || 0);

  sb.channel(`commitments_${SESSION_ID}`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'commitments',
      filter: `session_id=eq.${SESSION_ID}`
    }, p => addCard(p.new))
    .subscribe();
}

function addCard(r) {
  if (screenSeen.has(r.id)) return;
  screenSeen.add(r.id);
  const cat  = screenCats.find(c => c.id === r.category_id) || screenCats[0];
  if (!cat) return;
  const list = document.getElementById(`cl${r.category_id}`);
  if (!list) return;
  list.querySelector('.empty')?.remove();
  const el = document.createElement('div');
  el.className = 'card enter';
  el.innerHTML = `<p class="cr">${esc(r.response)}</p><p class="cname">${esc(r.name)}</p>`;
  list.prepend(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove('enter')));
  const cnt = document.getElementById(`ck${r.category_id}`);
  if (cnt) cnt.textContent = parseInt(cnt.textContent || 0) + 1;
  updateCount(screenSeen.size);
}

function updateCount(n) {
  const el = document.getElementById('spn');
  if (el) el.textContent = n;
}

async function resetAllCommitments() {
  if (!confirm('¿Limpiar todas las respuestas de esta sesión? Esta acción no se puede deshacer.')) return;
  await sb.from('commitments').delete().eq('session_id', SESSION_ID);
  screenSeen.clear();
  screenCats.forEach(c => {
    const list = document.getElementById(`cl${c.id}`);
    if (list) list.innerHTML = '<p class="empty">—</p>';
    const cnt  = document.getElementById(`ck${c.id}`);
    if (cnt)  cnt.textContent = '0';
  });
  updateCount(0);
}

async function exportPDF() {
  const { data } = await sb.from('commitments')
    .select('*').eq('session_id', SESSION_ID).order('created_at', { ascending: true });

  const date = new Date().toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' });
  let html = `<div class="ph"><h1>${esc(screenSession.question)}</h1><p>${date}</p></div>`;

  screenCats.forEach(cat => {
    const items = (data || []).filter(r => r.category_id === cat.id);
    html += `<div class="pcat"><h2>${esc(cat.name)}</h2><span>${items.length} compromisos</span></div>`;
    items.forEach(r => {
      html += `<div class="pcard"><p class="pcr">${esc(r.response)}</p><p class="pcname">${esc(r.name)}</p></div>`;
    });
  });

  document.getElementById('print-view').innerHTML = html;
  window.print();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
