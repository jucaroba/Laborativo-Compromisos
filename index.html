<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compromisos de Equipo — Laborativo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:#F4F4F5;color:#18181B}

    /* FORM */
    #fv{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:#F4F4F5;overflow-y:auto}
    #fc{width:100%;max-width:460px;background:#fff;border:1px solid #E4E4E7;border-radius:16px;padding:2rem;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    #flogo{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:#71717A;margin-bottom:.2rem;font-weight:600}
    #ftag{font-size:.78rem;color:#A1A1AA;margin-bottom:1.5rem}
    #fq{font-size:1.1rem;font-weight:700;color:#18181B;line-height:1.5;margin-bottom:1.75rem;padding-bottom:1.5rem;border-bottom:1px solid #E4E4E7}
    .fg{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem}
    .fg label{font-size:.72rem;letter-spacing:.07em;text-transform:uppercase;color:#71717A;font-weight:600}
    .fg input,.fg textarea{background:#fff;border:1.5px solid #E4E4E7;border-radius:10px;padding:.75rem 1rem;color:#18181B;font-size:.95rem;font-family:inherit;resize:none;outline:none;transition:border .2s}
    .fg input:focus,.fg textarea:focus{border-color:#4CAF50}
    #charcnt{font-size:.68rem;color:#A1A1AA;text-align:right;margin-top:.2rem}
    #sb{width:100%;padding:.9rem;background:#4CAF50;border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.3rem}
    #sb:hover{background:#43A047}
    #sb:disabled{opacity:.5;cursor:default}
    #success{display:none;flex-direction:column;align-items:center;text-align:center;gap:.75rem;padding:1.5rem 0}
    #sicon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#4CAF50,#388E3C);display:flex;align-items:center;justify-content:center;font-size:1.8rem}
    #success h3{color:#18181B;font-size:1.1rem}
    #success p{color:#71717A;font-size:.88rem}

    /* SCREEN */
    #sv{height:100vh;display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}
    #sh{display:flex;align-items:center;gap:1rem;padding:.75rem 1.2rem;background:#4CAF50;border-bottom:none}
    #sleft{display:flex;flex-direction:column;gap:.15rem;min-width:110px}
    #slogo2{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.7);font-weight:600}
    #spc{display:flex;align-items:baseline;gap:.3rem}
    #spn{font-size:3rem;font-weight:800;color:#fff;line-height:1}
    #spl{font-size:.9rem;color:rgba(255,255,255,.75)}
    #sq{flex:1;font-size:1.96rem;font-weight:700;color:#fff;text-align:center;line-height:1.4;padding:0 1rem}
    #sqrbox{display:flex;flex-direction:column;align-items:center;gap:.3rem;min-width:100px}
    #qrwrap{background:rgba(255,255,255,.15);border-radius:8px;padding:6px;border:1px solid rgba(255,255,255,.3)}
    #qrwrap canvas{display:block;border-radius:3px}
    #qrlabel{font-size:.68rem;color:rgba(255,255,255,.7);letter-spacing:.05em;text-align:center}
    #sgrid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:.55rem;padding:.65rem .9rem;overflow:hidden;background:#F4F4F5}
    .cs{background:#fff;border:1px solid #E4E4E7;border-radius:10px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
    .ch{display:flex;align-items:center;gap:.35rem;padding:.4rem .6rem;border-bottom:2px solid #4CAF50;flex-shrink:0;background:color-mix(in srgb, #4CAF50 8%, transparent)}
    .cn{font-size:1.64rem;font-weight:600;color:#4CAF50;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ck{font-size:.75rem;font-weight:700;color:#4CAF50;background:rgba(0,0,0,.05);border-radius:20px;padding:.15rem .45rem;flex-shrink:0}
    .cl{flex:1;padding:.4rem .5rem;display:flex;flex-direction:column;gap:.35rem;overflow:hidden;min-height:0}
    .card{border-left:3px solid #4CAF50;background:color-mix(in srgb, #4CAF50 5%, transparent);border-radius:0 6px 6px 0;padding:.35rem .5rem;transition:transform .4s ease,opacity .4s ease}
    .card.enter{transform:translateX(-10px);opacity:0}
    .cr{font-size:.88rem;color:#27272A;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .cname{font-size:.74rem;color:#4CAF50;margin-top:.15rem}
    .empty{font-size:.78rem;color:#D4D4D8;text-align:center;margin:auto;padding:.5rem}
    #rbar{padding:.35rem .9rem;display:flex;justify-content:flex-end;background:#fff;border-top:1px solid #E4E4E7}
    #rbtn{background:transparent;border:1px solid #E4E4E7;color:#A1A1AA;border-radius:6px;padding:.2rem .65rem;font-size:.72rem;cursor:pointer;transition:color .2s,border-color .2s}
    #rbtn:hover{color:#EF4444;border-color:#EF4444}
  </style>
</head>
<body>
<div id="root"></div>
<script>
// ─────────────────────────────────────────
// CONFIGURACIÓN — edita estos 2 valores
// ─────────────────────────────────────────
const SUPABASE_URL  = 'https://vnyzgbzqwqorimssuxza.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZueXpnYnpxd3Fvcmltc3N1eHphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTY2MTgsImV4cCI6MjA4ODkzMjYxOH0.sjRR89kZb8Dk5Dtuj4xmntlC2KX9IDzIeMwGBGvLUF8';
// ─────────────────────────────────────────

const QUESTION = '¿A qué te comprometes para ganar como equipo?';
const CATS = [
  {id:1, name:'Comunicación',           color:'#4CAF50', icon:'💬'},
  {id:2, name:'Confianza',              color:'#388E3C', icon:'🤝'},
  {id:3, name:'Responsabilidad',        color:'#66BB6A', icon:'🎯'},
  {id:4, name:'Colaboración',           color:'#2E7D32', icon:'🌿'},
  {id:5, name:'Visión compartida',      color:'#43A047', icon:'🔭'},
  {id:6, name:'Desarrollo del equipo',  color:'#558B2F', icon:'📈'},
  {id:7, name:'Gestión del conflicto',  color:'#81C784', icon:'⚖️'},
  {id:8, name:'Reconocimiento y bienestar', color:'#33691E', icon:'✨'},
];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const isForm = new URLSearchParams(location.search).get('view') === 'form';
isForm ? initForm() : initScreen();

// ══ FORMULARIO ══════════════════════════
function initForm() {
  document.getElementById('root').innerHTML = `
    <div id="fv"><div id="fc">
      <p id="flogo">laborativo</p>
      <p id="ftag">Dinámica de equipo</p>
      <h2 id="fq">${QUESTION}</h2>
      <div id="ff">
        <div class="fg">
          <label>Tu nombre</label>
          <input id="ni" type="text" placeholder="Ej: Camilo Restrepo" maxlength="60" autocomplete="off">
        </div>
        <div class="fg">
          <label>Tu compromiso</label>
          <textarea id="ri" rows="4" maxlength="220" placeholder="Escribe tu compromiso con el equipo..."></textarea>
          <span id="charcnt">0 / 220</span>
        </div>
        <button id="sb" onclick="handleSubmit()">Enviar compromiso →</button>
      </div>
      <div id="success">
        <div id="sicon">✓</div>
        <h3>¡Compromiso registrado!</h3>
        <p>Tu respuesta ya aparece en la pantalla del salón</p>
      </div>
    </div></div>`;
  document.getElementById('ri').oninput = function(){
    document.getElementById('charcnt').textContent = `${this.value.length} / 220`;
  };
}

async function handleSubmit() {
  const name = document.getElementById('ni').value.trim();
  const resp = document.getElementById('ri').value.trim();
  if (!name) { alert('Por favor escribe tu nombre'); return; }
  if (!resp)  { alert('Por favor escribe tu compromiso'); return; }

  const btn = document.getElementById('sb');
  btn.textContent = '⏳ Enviando...'; btn.disabled = true;

  let catId = 1;
  try {
    const r = await fetch('/api/classify', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text: resp })
    });
    const d = await r.json();
    catId = d.catId || 1;
  } catch(e) { catId = Math.ceil(Math.random()*8); }

  await sb.from('commitments').insert({ name, response: resp, category_id: catId });

  document.getElementById('ff').style.display = 'none';
  document.getElementById('success').style.display = 'flex';
}

// ══ PANTALLA PRESENTADOR ════════════════
const seen = new Set();

async function initScreen() {
  const formUrl = location.origin + location.pathname + '?view=form';
  document.getElementById('root').innerHTML = `
    <div id="sv">
      <header id="sh">
        <div id="sleft">
          <span id="slogo2">laborativo</span>
          <div id="spc"><span id="spn">0</span><span id="spl">&nbsp;participantes</span></div>
        </div>
        <h1 id="sq">${QUESTION}</h1>
        <div id="sqrbox">
          <div id="qrwrap"></div>
          <p id="qrlabel">Escanea para participar</p>
        </div>
      </header>
      <div id="sgrid">
        ${CATS.map(c=>`
          <div class="cs" style="--cc:${c.color}">
            <div class="ch"><span>${c.icon}</span><span class="cn">${c.name}</span><span class="ck" id="ck${c.id}">0</span></div>
            <div class="cl" id="cl${c.id}"><p class="empty">—</p></div>
          </div>`).join('')}
      </div>
      <div id="rbar"><button id="rbtn" onclick="resetAll()">🗑 Limpiar respuestas</button></div>
    </div>`;

  new QRCode(document.getElementById('qrwrap'), {
    text: formUrl, width:90, height:90,
    colorDark:'#1B5E20', colorLight:'rgba(255,255,255,.9)'
  });

  // Carga inicial
  const { data } = await sb.from('commitments').select('*').order('created_at', {ascending:true});
  (data||[]).forEach(r => addCard(r));
  updateCount(data?.length || 0);

  // Tiempo real
  sb.channel('commitments')
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'commitments'}, p => {
      addCard(p.new);
    })
    .subscribe();
}

function addCard(r) {
  if (seen.has(r.id)) return;
  seen.add(r.id);
  const cat = CATS.find(c=>c.id===r.category_id)||CATS[0];
  const list = document.getElementById(`cl${r.category_id}`);
  if (!list) return;
  list.querySelector('.empty')?.remove();
  const el = document.createElement('div');
  el.className = 'card enter';
  el.style.setProperty('--cc', cat.color);
  el.innerHTML = `<p class="cr">${esc(r.response)}</p><p class="cname">${esc(r.name)}</p>`;
  list.prepend(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.remove('enter')));
  while(list.children.length > 4) list.removeChild(list.lastChild);
  const cnt = document.getElementById(`ck${r.category_id}`);
  cnt.textContent = parseInt(cnt.textContent||0)+1;
  updateCount(seen.size);
}

function updateCount(n) { document.getElementById('spn').textContent = n; }

async function resetAll() {
  if (!confirm('¿Limpiar todas las respuestas? Esta acción no se puede deshacer.')) return;
  await sb.from('commitments').delete().neq('id','00000000-0000-0000-0000-000000000000');
  seen.clear();
  CATS.forEach(c=>{
    const list = document.getElementById(`cl${c.id}`);
    list.innerHTML='<p class="empty">—</p>';
    document.getElementById(`ck${c.id}`).textContent='0';
  });
  updateCount(0);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
