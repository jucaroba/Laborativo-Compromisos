<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compromisos de Equipo — Laborativo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:#F4F4F5;color:#18181B}

    /* FORM */
    #fv{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:#F4F4F5;overflow-y:auto}
    #fc{width:100%;max-width:460px;background:#fff;border:1px solid #E4E4E7;border-radius:16px;padding:2rem;box-shadow:0 1px 6px rgba(0,0,0,.06)}
    #ftag{font-size:.78rem;color:#A1A1AA;margin-bottom:1.5rem}
    #ffoot{font-size:.72rem;color:#A1A1AA;text-align:center;margin-top:1.2rem}
    #fq{font-size:2.1rem;font-weight:700;color:#fff;line-height:1.5;background:#4CAF50;margin:-2rem -2rem 1.75rem -2rem;padding:1.4rem 2rem;border-radius:14px 14px 0 0}
    .fg{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem}
    .fg label{font-size:.72rem;letter-spacing:.07em;text-transform:uppercase;color:#71717A;font-weight:600}
    .fg input,.fg textarea{background:#fff;border:1.5px solid #E4E4E7;border-radius:10px;padding:.75rem 1rem;color:#18181B;font-size:.95rem;font-family:inherit;resize:none;outline:none;transition:border .2s}
    .fg input:focus,.fg textarea:focus{border-color:#4CAF50}
    #catsel{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}
    .catopt{border:1.5px solid #E4E4E7;border-radius:10px;padding:.75rem 1rem;cursor:pointer;transition:all .15s;font-weight:600;color:#52525B;font-size:.95rem;text-align:center;display:flex;align-items:center;justify-content:center;min-height:56px}
    .catopt:hover{border-color:#4CAF50;background:rgba(76,175,80,.05)}
    .catopt.sel{border-color:#4CAF50;background:rgba(76,175,80,.08);color:#4CAF50}
    #charcnt{font-size:.68rem;color:#A1A1AA;text-align:right;margin-top:.2rem}
    #sb{width:100%;padding:.9rem;background:#4CAF50;border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.3rem}
    #sb:hover{background:#43A047}
    #sb:disabled{opacity:.5;cursor:default}
    #success{display:none;flex-direction:column;align-items:center;text-align:center;gap:.75rem;padding:1.5rem 0}
    #sicon{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#4CAF50,#388E3C);display:flex;align-items:center;justify-content:center;font-size:1.8rem}
    #success h3{color:#18181B;font-size:1.1rem}
    #success p{color:#71717A;font-size:.88rem}

    /* SCREEN */
    #sv{height:100vh;display:flex;flex-direction:column;overflow:hidden}
    #sh{display:flex;align-items:center;gap:1rem;padding:.75rem 1.2rem;background:#4CAF50;flex-shrink:0}
    #sleft{display:flex;flex-direction:column;gap:.3rem;min-width:130px}
    #slogo2{font-size:1rem;color:#fff;font-weight:500}
    #spc{display:flex;flex-direction:column;align-items:flex-start;gap:0}
    #spn{font-size:4.5rem;font-weight:800;color:#fff;line-height:1}
    #spl{font-size:1rem;color:#fff;margin-top:.1rem}
    #sq{flex:1;font-size:2.6rem;font-weight:700;color:#fff;text-align:center;line-height:1.4;padding:0 1rem}
    #sqrbox{display:flex;flex-direction:column;align-items:center;gap:.3rem;min-width:100px}
    #qrwrap{border-radius:6px;overflow:hidden}
    #qrwrap canvas{display:block;border-radius:3px}
    #qrlabel{font-size:1rem;color:#fff;text-align:center}
    #sgrid{flex:1;display:grid;grid-template-columns:repeat(2,1fr);align-items:start;gap:0;padding:.75rem 0;overflow-y:auto;background:#F4F4F5;position:relative}
    #sgrid::before{content:'';position:absolute;left:50%;top:.75rem;bottom:.75rem;border-left:2px dashed #B0BEC5;pointer-events:none}
    .cs{background:transparent;border:none;display:flex;flex-direction:column;padding:0 1rem}
    .ch{display:flex;align-items:center;gap:.5rem;padding:.3rem .1rem .5rem;margin-bottom:.3rem}
    .cn{font-size:1.64rem;font-weight:600;color:#4CAF50;flex:1;outline:none;cursor:text;border-radius:4px;padding:2px 4px;transition:background .15s}
    .cn:hover{background:rgba(76,175,80,.12)}
    .cn:focus{background:rgba(76,175,80,.18)}
    .ck{font-size:1.3rem;font-weight:700;color:#4CAF50;background:rgba(76,175,80,.1);border-radius:20px;padding:.15rem .55rem;flex-shrink:0}
    .cl{padding:0;columns:3;column-gap:.5rem}
    .card{break-inside:avoid;margin-bottom:.5rem;background:#fff;border:1.5px solid #4CAF50;border-top:3px solid #4CAF50;border-radius:0 !important;padding:.5rem .7rem;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:transform .4s ease,opacity .4s ease;display:block;overflow:hidden}
    .card.enter{transform:translateY(-8px);opacity:0}
    .cr{font-size:1rem;color:#1C1C1E;line-height:1.45}
    .cname{font-size:.88rem;color:#2E7D32;margin-top:.25rem;font-weight:600}
    .empty{font-size:.78rem;color:#D4D4D8;text-align:center;padding:.5rem}
    #rbar{padding:.35rem .9rem;display:flex;justify-content:flex-end;gap:.5rem;background:#fff;border-top:1px solid #E4E4E7;flex-shrink:0}
    #rbtn,#pbtn{border-radius:6px;padding:.2rem .65rem;font-size:.72rem;cursor:pointer;background:#4CAF50;border:none;color:#fff;transition:background .2s}
    #rbtn:hover,#pbtn:hover{background:#388E3C}

    /* PRINT */
    #print-view{display:none}
    @media print{
      #root{display:none}
      #print-view{display:block;font-family:'DM Sans',sans-serif;color:#1C1C1E;padding:2.5rem}
      .ph{background:#4CAF50 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;margin-bottom:2rem;padding:1.2rem 1.5rem;border-radius:4px}
      .ph h1{font-size:1.6rem;font-weight:800;color:#fff !important;margin-bottom:.3rem}
      .ph p{font-size:.85rem;color:rgba(255,255,255,.85) !important}
      .pcat{margin-top:2rem;margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:2px solid #4CAF50;display:flex;align-items:baseline;gap:.75rem}
      .pcat h2{font-size:1.15rem;font-weight:700;color:#4CAF50}
      .pcat span{font-size:.78rem;color:#A1A1AA}
      .pcard{padding:.5rem 0;border-bottom:1px solid #F0F0F0}
      .pcr{font-size:.9rem;line-height:1.45;margin-bottom:.1rem}
      .pcname{font-size:.78rem;color:#2E7D32;font-weight:600;margin-top:0}
    }
  </style>
</head>
<body>
<div id="root"></div>
<div id="print-view"></div>
<script>
// ─────────────────────────────────────────
// CONFIGURACIÓN — edita estos 2 valores
// ─────────────────────────────────────────
const SUPABASE_URL  = 'https://vnyzgbzqwqorimssuxza.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZueXpnYnpxd3Fvcmltc3N1eHphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTY2MTgsImV4cCI6MjA4ODkzMjYxOH0.sjRR89kZb8Dk5Dtuj4xmntlC2KX9IDzIeMwGBGvLUF8';
// ─────────────────────────────────────────

const QUESTION = '¿A qué te comprometes para ganar como equipo?';
const CATS = [
  {id:1, name:'Categoría 1', color:'#4CAF50'},
  {id:2, name:'Categoría 2', color:'#4CAF50'},
];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const isForm = new URLSearchParams(location.search).get('view') === 'form';
isForm ? initForm() : initScreen();

// ══ FORMULARIO ══════════════════════════
let selectedCatId = null;

async function initForm() {
  const { data: cats } = await sb.from('categories').select('*').order('id');
  const categories = cats?.length ? cats : CATS.map(c=>({id:c.id, name:c.name}));

  document.getElementById('root').innerHTML = `
    <div id="fv"><div id="fc">
      <h2 id="fq">${QUESTION}</h2>
      <div id="ff">
        <div class="fg">
          <label>Tu nombre</label>
          <input id="ni" type="text" placeholder="Ej: Camilo Restrepo" maxlength="60" autocomplete="off">
        </div>
        <div class="fg">
          <label>Categoría</label>
          <div id="catsel">
            ${categories.map(c=>`<div class="catopt" data-id="${c.id}" onclick="selectCat(${c.id})">${esc(c.name)}</div>`).join('')}
          </div>
        </div>
        <div class="fg">
          <label>Tu compromiso</label>
          <textarea id="ri" rows="4" maxlength="150" placeholder="Escribe tu compromiso con el equipo..."></textarea>
          <span id="charcnt">0 / 150</span>
        </div>
        <button id="sb" onclick="handleSubmit()">Enviar compromiso →</button>
        <p id="ffoot">una experiencia laborativo.</p>
      </div>
      <div id="success">
        <div id="sicon">✓</div>
        <h3>¡Compromiso registrado!</h3>
        <p>Tu respuesta ya aparece en la pantalla del salón</p>
      </div>
    </div></div>`;

  document.getElementById('ri').oninput = function(){
    document.getElementById('charcnt').textContent = `${this.value.length} / 150`;
  };
}

function selectCat(id) {
  selectedCatId = id;
  document.querySelectorAll('.catopt').forEach(el => {
    el.classList.toggle('sel', parseInt(el.dataset.id) === id);
  });
}

async function handleSubmit() {
  const name = document.getElementById('ni').value.trim();
  const resp = document.getElementById('ri').value.trim();
  if (!name)           { alert('Por favor escribe tu nombre'); return; }
  if (!selectedCatId)  { alert('Por favor selecciona una categoría'); return; }
  if (!resp)           { alert('Por favor escribe tu compromiso'); return; }

  const btn = document.getElementById('sb');
  btn.textContent = '⏳ Enviando...'; btn.disabled = true;

  await sb.from('commitments').insert({ name, response: resp, category_id: selectedCatId });

  document.getElementById('ff').style.display = 'none';
  document.getElementById('success').style.display = 'flex';
}

// ══ PANTALLA PRESENTADOR ════════════════
const seen = new Set();
const CAT_NAMES_KEY = 'laborativo_cat_names';

function loadCatName(id) {
  try { return JSON.parse(localStorage.getItem(CAT_NAMES_KEY)||'{}')[id] || null; } catch{ return null; }
}
async function saveCatName(id, name) {
  try {
    const obj = JSON.parse(localStorage.getItem(CAT_NAMES_KEY)||'{}');
    obj[id] = name;
    localStorage.setItem(CAT_NAMES_KEY, JSON.stringify(obj));
  } catch{}
  await sb.from('categories').upsert({id, name});
}

async function initScreen() {
  const formUrl = location.origin + location.pathname + '?view=form';
  document.getElementById('root').innerHTML = `
    <div id="sv">
      <header id="sh">
        <div id="sleft">
          <span id="slogo2">una experiencia laborativo.</span>
          <div id="spc"><span id="spn">0</span><span id="spl">participantes</span></div>
        </div>
        <h1 id="sq">${QUESTION}</h1>
        <div id="sqrbox">
          <div id="qrwrap"></div>
          <p id="qrlabel">Escanea para participar</p>
        </div>
      </header>
      <div id="sgrid">
        ${CATS.map(c=>`
          <div class="cs" style="--cc:${c.color}">
            <div class="ch"><span class="cn" id="cn${c.id}" contenteditable="true" spellcheck="false" data-id="${c.id}">${loadCatName(c.id)||c.name}</span><span class="ck" id="ck${c.id}">0</span></div>
            <div class="cl" id="cl${c.id}"><p class="empty">—</p></div>
          </div>`).join('')}
      </div>
      <div id="rbar">
        <button id="pbtn" onclick="exportPDF()">Exportar PDF</button>
        <button id="rbtn" onclick="resetAll()">Limpiar respuestas</button>
      </div>
    </div>`;

  // Guardar nombres al editar
  CATS.forEach(c => {
    const el = document.getElementById(`cn${c.id}`);
    el.addEventListener('blur', () => saveCatName(c.id, el.textContent.trim()));
    el.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); el.blur(); } });
  });

  new QRCode(document.getElementById('qrwrap'), {
    text: formUrl, width:90, height:90,
    colorDark:'#fff', colorLight:'#4CAF50'
  });

  // Carga inicial
  const { data } = await sb.from('commitments').select('*').order('created_at', {ascending:true});
  (data||[]).forEach(r => addCard(r));
  updateCount(data?.length || 0);

  // Tiempo real
  sb.channel('commitments')
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'commitments'}, p => {
      addCard(p.new);
    })
    .subscribe();
}

function addCard(r) {
  if (seen.has(r.id)) return;
  seen.add(r.id);
  const cat = CATS.find(c=>c.id===r.category_id)||CATS[0];
  const list = document.getElementById(`cl${r.category_id}`);
  if (!list) return;
  list.querySelector('.empty')?.remove();
  const el = document.createElement('div');
  el.className = 'card enter';
  el.style.setProperty('--cc', cat.color);
  el.innerHTML = `<p class="cr">${esc(r.response)}</p><p class="cname">${esc(r.name)}</p>`;
  list.prepend(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.remove('enter')));
  const cnt = document.getElementById(`ck${r.category_id}`);
  cnt.textContent = parseInt(cnt.textContent||0)+1;
  updateCount(seen.size);
}

function updateCount(n) { document.getElementById('spn').textContent = n; }

async function resetAll() {
  if (!confirm('¿Limpiar todas las respuestas? Esta acción no se puede deshacer.')) return;
  await sb.from('commitments').delete().neq('id','00000000-0000-0000-0000-000000000000');
  seen.clear();
  CATS.forEach(c=>{
    const list = document.getElementById(`cl${c.id}`);
    list.innerHTML='<p class="empty">—</p>';
    document.getElementById(`ck${c.id}`).textContent='0';
  });
  updateCount(0);
}

async function exportPDF() {
  const { data } = await sb.from('commitments').select('*').order('created_at', {ascending:true});
  const { data: cats } = await sb.from('categories').select('*').order('id');
  const categories = cats?.length ? cats : CATS.map(c=>({id:c.id, name:c.name}));

  const date = new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'});
  let html = `<div class="ph"><h1>Todos a la cancha.</h1><p>${date}</p></div>`;

  categories.forEach(cat => {
    const domEl = document.getElementById(`cn${cat.id}`);
    const name = domEl ? domEl.textContent.trim() : cat.name;
    const items = (data||[]).filter(r => r.category_id === cat.id);
    html += `<div class="pcat"><h2>${esc(name)}</h2><span>${items.length} compromisos</span></div>`;
    items.forEach(r => {
      html += `<div class="pcard"><p class="pcr">${esc(r.response)}</p><p class="pcname">${esc(r.name)}</p></div>`;
    });
  });

  document.getElementById('print-view').innerHTML = html;
  window.print();
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
